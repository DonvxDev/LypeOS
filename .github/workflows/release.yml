name: Build and Publish Lype OS Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version string
        required: true
        default: 0.1.0
      artifact_dir:
        description: Folder containing release files
        required: true
        default: gsi

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Create release archive
        run: |
          mkdir -p dist
          python3 tools/package_gsi_release.py \
            --input-dir "${{ github.event.inputs.artifact_dir }}" \
            --output "dist/LypeOS-gsi-${{ github.event.inputs.version }}.7z" \
            --name "Lype OS GSI" \
            --version "${{ github.event.inputs.version }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.7z
          tag_name: v${{ github.event.inputs.version }}
          name: Lype OS GSI ${{ github.event.inputs.version }}
          body: |
            Lype OS GSI release archive.

            Place GSI files in the gsi folder before running the workflow.
